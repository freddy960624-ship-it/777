<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧坐姿監測 | Smart Posture Monitor</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --shadow: 0 20px 60px -15px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: radial-gradient(ellipse at top, #1e293b 0%, #0f172a 50%, #020617 100%);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app {
            width: 100%;
            max-width: 1280px;
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 24px;
        }

        .panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .video-panel {
            position: relative;
            aspect-ratio: 4 / 3;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            pointer-events: none;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 10;
            transition: opacity 0.3s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--bg-tertiary);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 5;
        }

        .badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-banner {
            position: absolute;
            bottom: 16px;
            left: 16px;
            right: 16px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            padding: 16px 20px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s;
            z-index: 5;
        }

        .status-banner.normal {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.15);
        }

        .status-banner.slouching {
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.15);
            animation: shake 0.4s;
        }

        .status-banner.warning {
            border-color: var(--warning);
            background: rgba(245, 158, 11, 0.15);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .status-text {
            font-size: 18px;
            font-weight: 600;
        }

        .status-icon {
            font-size: 24px;
        }

        .control-panel {
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #6366f1 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .calibration-status {
            background: var(--bg-tertiary);
            padding: 14px 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
        }

        .calibration-status .label {
            color: var(--text-secondary);
        }

        .calibration-status .value {
            font-weight: 600;
            color: var(--warning);
        }

        .calibration-status.calibrated .value {
            color: var(--success);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-card {
            background: var(--bg-tertiary);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .stat-card.good { border-color: rgba(16, 185, 129, 0.3); }
        .stat-card.bad { border-color: rgba(239, 68, 68, 0.3); }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .stat-value.good { color: var(--success); }
        .stat-value.bad { color: var(--danger); }

        .stat-unit {
            font-size: 12px;
            color: var(--text-secondary);
            margin-left: 4px;
            font-weight: 400;
        }

        .progress-bar {
            background: var(--bg-tertiary);
            border-radius: 12px;
            overflow: hidden;
            height: 8px;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success), #34d399);
            transition: width 0.5s ease;
            border-radius: 12px;
        }

        .accuracy-display {
            text-align: center;
            padding: 8px 0;
        }

        .accuracy-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .accuracy-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: auto;
        }

        .btn {
            padding: 14px 18px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px -4px rgba(99, 102, 241, 0.5);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .tip {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            padding: 8px;
            background: rgba(99, 102, 241, 0.08);
            border-radius: 8px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        /* Report modal */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .modal-backdrop.active {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 32px;
            max-width: 480px;
            width: 100%;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .modal h2 {
            font-size: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .report-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .report-advice {
            background: var(--bg-tertiary);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.5;
        }

        @media (max-width: 900px) {
            .app {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="panel video-panel">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="canvas"></canvas>

            <div class="badge">
                <span class="dot" id="liveDot"></span>
                <span id="fpsCounter">LIVE</span>
            </div>

            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
                <div class="loading-text" id="loadingText">載入 AI 模型中...</div>
            </div>

            <div class="status-banner" id="statusBanner">
                <div>
                    <div class="status-text" id="statusText">準備中...</div>
                </div>
                <div class="status-icon" id="statusIcon">⏳</div>
            </div>
        </div>

        <div class="panel control-panel">
            <div class="header">
                <h1>智慧坐姿監測</h1>
                <p>AI 即時偵測 · 保護您的脊椎健康</p>
            </div>

            <div class="calibration-status" id="calibrationCard">
                <span class="label">校準狀態</span>
                <span class="value" id="calibrationStatus">未校準</span>
            </div>

            <div class="stats-grid">
                <div class="stat-card good">
                    <div class="stat-label">良好姿勢</div>
                    <div class="stat-value good">
                        <span id="normalTime">0</span><span class="stat-unit">秒</span>
                    </div>
                </div>
                <div class="stat-card bad">
                    <div class="stat-label">駝背時間</div>
                    <div class="stat-value bad">
                        <span id="slouchTime">0</span><span class="stat-unit">秒</span>
                    </div>
                </div>
            </div>

            <div>
                <div class="accuracy-display">
                    <div class="accuracy-label">姿勢分數</div>
                    <div class="accuracy-value" id="accuracyValue">--</div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>

            <div class="tip" id="tip">
                💡 請坐直後點擊「開始校準」設定基準
            </div>

            <div class="buttons">
                <button class="btn btn-primary" id="calibrateBtn">
                    <span>🎯</span> 開始校準
                </button>
                <button class="btn btn-secondary" id="reportBtn">
                    <span>📊</span> 生成報告
                </button>
                <button class="btn btn-ghost" id="resetBtn">
                    <span>🔄</span> 重置數據
                </button>
            </div>
        </div>
    </div>

    <div class="modal-backdrop" id="reportModal">
        <div class="modal">
            <h2>📊 姿勢健康報告</h2>
            <div class="report-stats">
                <div class="stat-card good">
                    <div class="stat-label">良好姿勢</div>
                    <div class="stat-value good">
                        <span id="reportNormal">0</span><span class="stat-unit">秒</span>
                    </div>
                </div>
                <div class="stat-card bad">
                    <div class="stat-label">駝背時間</div>
                    <div class="stat-value bad">
                        <span id="reportSlouch">0</span><span class="stat-unit">秒</span>
                    </div>
                </div>
            </div>
            <div class="accuracy-display">
                <div class="accuracy-label">總體姿勢分數</div>
                <div class="accuracy-value" id="reportAccuracy">0%</div>
            </div>
            <div class="report-advice" id="reportAdvice"></div>
            <button class="btn btn-primary" onclick="document.getElementById('reportModal').classList.remove('active')">
                關閉
            </button>
        </div>
    </div>

    <!-- MediaPipe Face Detection -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4/face_detection.js" crossorigin="anonymous"></script>

    <script>
        class PostureMonitor {
            constructor() {
                this.video = document.getElementById('video');
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');

                this.calibratedY = null;
                this.slouchThreshold = 35;
                this.records = { normal: 0, slouch: 0 };
                this.lastRecordTime = 0;
                this.slouchStartTime = null;
                this.lastDetection = null;
                this.noDetectionFrames = 0;
                this.fps = 0;
                this.frameCount = 0;
                this.lastFpsTime = performance.now();

                this.smoothedY = null;
                this.smoothingFactor = 0.3;

                this.bindUI();
                this.init();
            }

            bindUI() {
                document.getElementById('calibrateBtn').onclick = () => this.calibrate();
                document.getElementById('reportBtn').onclick = () => this.showReport();
                document.getElementById('resetBtn').onclick = () => this.reset();
            }

            async init() {
                try {
                    this.setLoading('啟動攝影機...');
                    await this.startCamera();

                    this.setLoading('載入 AI 模型...');
                    await this.loadModel();

                    this.hideLoading();
                    this.setStatus('請點擊校準開始', 'warning', '🎯');
                    this.detectLoop();
                } catch (err) {
                    console.error('初始化失敗:', err);
                    this.setLoading('❌ ' + err.message);
                }
            }

            async startCamera() {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        facingMode: 'user'
                    },
                    audio: false
                });
                this.video.srcObject = stream;
                await new Promise(resolve => {
                    this.video.onloadedmetadata = () => {
                        this.canvas.width = this.video.videoWidth;
                        this.canvas.height = this.video.videoHeight;
                        resolve();
                    };
                });
            }

            async loadModel() {
                this.faceDetection = new FaceDetection({
                    locateFile: (file) =>
                        `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4/${file}`
                });
                this.faceDetection.setOptions({
                    model: 'short',
                    minDetectionConfidence: 0.5
                });
                this.faceDetection.onResults((results) => this.onResults(results));
                await this.faceDetection.initialize();
            }

            async detectLoop() {
                if (this.video.readyState >= 2) {
                    await this.faceDetection.send({ image: this.video });
                    this.updateFps();
                }
                requestAnimationFrame(() => this.detectLoop());
            }

            updateFps() {
                this.frameCount++;
                const now = performance.now();
                if (now - this.lastFpsTime >= 1000) {
                    this.fps = this.frameCount;
                    this.frameCount = 0;
                    this.lastFpsTime = now;
                    document.getElementById('fpsCounter').textContent = `LIVE · ${this.fps} FPS`;
                }
            }

            onResults(results) {
                this.ctx.save();
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                if (!results.detections || results.detections.length === 0) {
                    this.noDetectionFrames++;
                    if (this.noDetectionFrames > 10) {
                        this.setStatus('未偵測到人像', 'warning', '👤');
                        this.lastDetection = null;
                        this.smoothedY = null;
                    }
                    this.ctx.restore();
                    return;
                }

                this.noDetectionFrames = 0;

                // largest detection
                const detection = results.detections.reduce((a, b) => {
                    const aSize = a.boundingBox.width * a.boundingBox.height;
                    const bSize = b.boundingBox.width * b.boundingBox.height;
                    return aSize > bSize ? a : b;
                });

                const bbox = detection.boundingBox;
                const w = bbox.width * this.canvas.width;
                const h = bbox.height * this.canvas.height;
                const x = (bbox.xCenter * this.canvas.width) - w / 2;
                const y = (bbox.yCenter * this.canvas.height) - h / 2;
                const centerY = bbox.yCenter * this.canvas.height;

                // smooth Y to avoid jitter
                if (this.smoothedY === null) {
                    this.smoothedY = centerY;
                } else {
                    this.smoothedY = this.smoothedY * (1 - this.smoothingFactor) + centerY * this.smoothingFactor;
                }

                this.lastDetection = { x, y, w, h, centerY: this.smoothedY };
                this.draw(this.lastDetection);
                this.evaluate(this.smoothedY);

                this.ctx.restore();
            }

            draw(d) {
                const isSlouching = this.calibratedY !== null &&
                    (d.centerY - this.calibratedY) > this.slouchThreshold;

                // baseline (mirrored draw - already mirrored via CSS)
                if (this.calibratedY !== null) {
                    this.ctx.strokeStyle = '#6366f1';
                    this.ctx.lineWidth = 2;
                    this.ctx.setLineDash([8, 6]);
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, this.calibratedY);
                    this.ctx.lineTo(this.canvas.width, this.calibratedY);
                    this.ctx.stroke();
                    this.ctx.setLineDash([]);
                }

                // current center
                this.ctx.strokeStyle = isSlouching ? '#ef4444' : '#10b981';
                this.ctx.lineWidth = 3;
                this.ctx.beginPath();
                this.ctx.moveTo(d.x, d.centerY);
                this.ctx.lineTo(d.x + d.w, d.centerY);
                this.ctx.stroke();

                // bounding box
                this.ctx.strokeStyle = isSlouching ? '#ef4444' : '#10b981';
                this.ctx.lineWidth = 3;
                this.ctx.strokeRect(d.x, d.y, d.w, d.h);

                // corner accents
                const cornerLen = 14;
                this.ctx.lineWidth = 4;
                this.ctx.beginPath();
                // TL
                this.ctx.moveTo(d.x, d.y + cornerLen); this.ctx.lineTo(d.x, d.y); this.ctx.lineTo(d.x + cornerLen, d.y);
                // TR
                this.ctx.moveTo(d.x + d.w - cornerLen, d.y); this.ctx.lineTo(d.x + d.w, d.y); this.ctx.lineTo(d.x + d.w, d.y + cornerLen);
                // BL
                this.ctx.moveTo(d.x, d.y + d.h - cornerLen); this.ctx.lineTo(d.x, d.y + d.h); this.ctx.lineTo(d.x + cornerLen, d.y + d.h);
                // BR
                this.ctx.moveTo(d.x + d.w - cornerLen, d.y + d.h); this.ctx.lineTo(d.x + d.w, d.y + d.h); this.ctx.lineTo(d.x + d.w, d.y + d.h - cornerLen);
                this.ctx.stroke();
            }

            evaluate(centerY) {
                if (this.calibratedY === null) {
                    this.setStatus('請進行校準', 'warning', '🎯');
                    return;
                }

                const drop = centerY - this.calibratedY;

                if (drop > this.slouchThreshold) {
                    if (this.slouchStartTime === null) {
                        this.slouchStartTime = performance.now();
                    }
                    const slouchDuration = (performance.now() - this.slouchStartTime) / 1000;

                    if (slouchDuration > 2) {
                        this.setStatus(`駝背警告 (${slouchDuration.toFixed(0)}s)`, 'slouching', '⚠️');
                    } else {
                        this.setStatus('姿勢偏離', 'warning', '👀');
                    }
                    this.recordStatus('slouch');
                } else {
                    this.slouchStartTime = null;
                    this.setStatus('姿勢良好', 'normal', '✅');
                    this.recordStatus('normal');
                }

                this.updateStats();
            }

            recordStatus(type) {
                const now = performance.now();
                if (now - this.lastRecordTime >= 1000) {
                    this.records[type]++;
                    this.lastRecordTime = now;
                }
            }

            updateStats() {
                document.getElementById('normalTime').textContent = this.records.normal;
                document.getElementById('slouchTime').textContent = this.records.slouch;

                const total = this.records.normal + this.records.slouch;
                const accuracy = total > 0 ? Math.round((this.records.normal / total) * 100) : 0;
                document.getElementById('accuracyValue').textContent = total > 0 ? `${accuracy}%` : '--';
                document.getElementById('progressFill').style.width = `${accuracy}%`;

                // colour transition for progress
                const fill = document.getElementById('progressFill');
                if (accuracy >= 80) {
                    fill.style.background = 'linear-gradient(90deg, var(--success), #34d399)';
                } else if (accuracy >= 50) {
                    fill.style.background = 'linear-gradient(90deg, var(--warning), #fbbf24)';
                } else {
                    fill.style.background = 'linear-gradient(90deg, var(--danger), #f87171)';
                }
            }

            calibrate() {
                if (!this.lastDetection) {
                    this.setStatus('未偵測到人臉，請對準鏡頭', 'warning', '⚠️');
                    return;
                }
                this.calibratedY = this.lastDetection.centerY;
                const card = document.getElementById('calibrationCard');
                card.classList.add('calibrated');
                document.getElementById('calibrationStatus').textContent = '已校準 ✓';
                document.getElementById('tip').innerHTML = '✨ 校準完成！系統會自動監測您的姿勢';
                this.setStatus('校準成功', 'normal', '✅');
            }

            setStatus(text, type, icon) {
                const banner = document.getElementById('statusBanner');
                document.getElementById('statusText').textContent = text;
                document.getElementById('statusIcon').textContent = icon;
                banner.className = `status-banner ${type}`;
            }

            setLoading(text) {
                document.getElementById('loadingOverlay').classList.remove('hidden');
                document.getElementById('loadingText').textContent = text;
            }

            hideLoading() {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }

            showReport() {
                const total = this.records.normal + this.records.slouch;
                if (total === 0) {
                    alert('尚無數據，請先進行姿勢偵測');
                    return;
                }
                const accuracy = (this.records.normal / total) * 100;

                document.getElementById('reportNormal').textContent = this.records.normal;
                document.getElementById('reportSlouch').textContent = this.records.slouch;
                document.getElementById('reportAccuracy').textContent = `${accuracy.toFixed(1)}%`;

                let advice;
                if (accuracy >= 90) advice = '🏆 完美！您的坐姿堪稱典範，請繼續保持！';
                else if (accuracy >= 75) advice = '👍 不錯！偶爾的駝背要注意，整體表現良好。';
                else if (accuracy >= 50) advice = '⚠️ 需要改善！請更注意挺直背部，避免久坐。';
                else advice = '🚨 警告！長時間駝背會傷害脊椎，請立即調整姿勢並休息。';

                document.getElementById('reportAdvice').textContent = advice;
                document.getElementById('reportModal').classList.add('active');
            }

            reset() {
                if (!confirm('確定要重置所有數據與校準嗎？')) return;
                this.records = { normal: 0, slouch: 0 };
                this.calibratedY = null;
                this.smoothedY = null;
                this.slouchStartTime = null;
                document.getElementById('calibrationCard').classList.remove('calibrated');
                document.getElementById('calibrationStatus').textContent = '未校準';
                document.getElementById('tip').innerHTML = '💡 請坐直後點擊「開始校準」設定基準';
                this.updateStats();
                this.setStatus('已重置', 'warning', '🔄');
            }
        }

        window.addEventListener('load', () => new PostureMonitor());
    </script>
</body>
</html>
